services:
  gosom:
    image: gosom/google-maps-scraper:latest
    container_name: gmaps-scraper
    command: ["-web", "-addr", ":8080", "-data-folder", "/gmapsdata"]
    ports:
      - "8080:8080"
    volumes:
      - ./gosom-data:/gmapsdata
    restart: unless-stopped

  app:
    build: .
    container_name: prospection-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./data/dev.db
      - GOSOM_API_URL=http://gosom:8080
      - PSI_API_KEY=${PSI_API_KEY}
      - OPENPAGERANK_API_KEY=${OPENPAGERANK_API_KEY}
      - PAPPERS_API_KEY=${PAPPERS_API_KEY}
      - PAPPERS_MONTHLY_LIMIT=${PAPPERS_MONTHLY_LIMIT:-100}
    volumes:
      - ./data:/app/data
    depends_on:
      - gosom
    restart: unless-stopped
