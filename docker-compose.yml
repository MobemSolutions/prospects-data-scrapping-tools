services:
  gosom:
    image: gosom/google-maps-scraper:latest
    container_name: gmaps-scraper
    command: ["-web", "-addr", ":8080", "-data-folder", "/gmapsdata"]
    ports:
      - "8080:8080"
    volumes:
      - ./gosom-data:/gmapsdata
    restart: unless-stopped

  app:
    build: .
    container_name: prospection-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./data/dev.db
      - GOSOM_API_URL=http://gosom:8080
      - PSI_API_KEY=${PSI_API_KEY}
      - OPENPAGERANK_API_KEY=${OPENPAGERANK_API_KEY}
      - PAPPERS_API_KEY=${PAPPERS_API_KEY}
      - PAPPERS_MONTHLY_LIMIT=${PAPPERS_MONTHLY_LIMIT:-100}
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - ALLOWED_EMAIL_DOMAIN=${ALLOWED_EMAIL_DOMAIN:-mobem-solutions.com}
    volumes:
      - ./data:/app/data
    depends_on:
      - gosom
    restart: unless-stopped
